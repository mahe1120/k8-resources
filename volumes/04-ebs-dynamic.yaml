apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-dynamic
spec:
  storageClassName: "ebs-sc"
  # PV name
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 19Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: ebs-dynamic
  labels:
    purpose: "ebs-dynamic-demo"
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1a
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: persistent-storage
      # Mount Path should be the one which you want to store in volumes
      mountPath: /usr/share/nginx/html
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: ebs-dynamic

---
kind: Service
apiVersion: v1
metadata:
  name: nginx-dynamic
spec:
  type: LoadBalancer
  selector:
    purpose: "ebs-dynamic-demo"
  ports:
  - protocol: TCP
    port: 80  # service port
    targetPort: 80
    nodePort: 30007